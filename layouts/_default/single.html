{{- define "main" }}
<article class="gt-page gt-single">
    <header class="gt-page-hero">
        {{- partial "breadcrumbs.html" . }}
        <p class="section-kicker">{{ .Params.kicker | default (.Section | default "Galturan" | humanize) }}</p>
        <h1>{{ .Title }}</h1>
        {{- with .Description }}
        <p class="gt-page-lead">{{ . | markdownify }}</p>
        {{- end }}
    </header>

    {{- with .Content }}
    <div class="gt-content post-content">
        {{ . }}
    </div>
    {{- end }}
</article>
{{- end }}
