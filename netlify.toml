[build]
  command = 'hugo --gc --minify --cacheDir "$PWD/resources/_gen"'
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.161.1"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[context.deploy-preview]
  command = 'hugo --gc --minify --buildFuture --cacheDir "$PWD/resources/_gen"'

[context.branch-deploy]
  command = 'hugo --gc --minify --buildFuture --cacheDir "$PWD/resources/_gen"'

[dev]
  command = 'mise exec -- hugo server --bind 127.0.0.1 --port 1313 --buildDrafts --cacheDir "$PWD/resources/_gen"'
  port = 8888
  targetPort = 1313
  framework = "#custom"

[context.dev.environment]
  HUGO_ENV = "development"
