[build]
  command = 'npm run build'
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.160.1"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
  NODE_VERSION = "24"

[context.deploy-preview]
  command = 'npm run build:preview'

[context.branch-deploy]
  command = 'npm run build:preview'

[dev]
  command = 'mise exec -- hugo server --bind 127.0.0.1 --port 1313 --buildDrafts --cacheDir "$PWD/resources/_gen"'
  port = 8888
  targetPort = 1313
  framework = "#custom"

[context.dev.environment]
  HUGO_ENV = "development"
